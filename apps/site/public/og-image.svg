  <text x="132" y="455" fill="#5d6555" font-family="Arial, sans-serif" font-size="22" letter-spacing="3">WHY IT STANDS OUT</text>
  <text x="132" y="499" fill="#23271f" font-family="Arial, sans-serif" font-size="28">A complete online alternative to desktop database tools, without flat connection lists or ugly web admin vibes.</text>
