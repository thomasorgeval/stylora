  <text x="276" y="210" fill="#23271f" font-family="Georgia, serif" font-size="72" letter-spacing="-3">Stylora</text>
  <text x="276" y="292" fill="#23271f" font-family="Georgia, serif" font-size="54" letter-spacing="-2">The browser-native PostgreSQL workspace</text>
  <text x="276" y="346" fill="#4f5648" font-family="Arial, sans-serif" font-size="28">Structured for organizations and projects. Self-hosted today, managed cloud next.</text>
